[tool.uv.workspace]
members = [
  "backend",
  "qwen-code-api",
  "mcp/mcp-lms",
  "mcp/mcp-obs",
  "nanobot",
  # Uncomment these later in the lab after you add the matching repos/packages.
  "nanobot-websocket-channel/nanobot-channel-protocol",
  "nanobot-websocket-channel/mcp-webchat",
  "nanobot-websocket-channel/nanobot-webchat",
  # "nanobot-websocket-channel/client-telegram-bot",
]

[tool.uv.sources]
mcp-lms = { path = "mcp/mcp-lms", editable = true }
mcp-obs = { path = "mcp/mcp-obs", editable = true }

# Uncomment these later in the lab after you add the matching repos/packages.

# mcp-obs = { path = "mcp/mcp-obs", editable = true }
mcp-webchat = { path = "nanobot-websocket-channel/mcp-webchat", editable = true }
nanobot-channel-protocol = { path = "nanobot-websocket-channel/nanobot-channel-protocol", editable = true }
nanobot-webchat = { path = "nanobot-websocket-channel/nanobot-webchat", editable = true }
# client-telegram-bot = { path = "nanobot-websocket-channel/client-telegram-bot", editable = true }

[dependency-groups]
dev = [
  "poethepoet==0.42.1",
  "pyright==1.1.408",
  "pytest==9.0.2",
  "pytest-asyncio==1.3.0",
  "ruff==0.15.8",
  "ty==0.0.26",
]

[tool.ruff]
exclude = ["qwen-code-api"]

[tool.ruff.lint]
select = ["RET503"]

[tool.poe.tasks]
# Run server

## Check code and run server in dev mode

[tool.poe.tasks.dev]
help = "Run server after static analysis"
sequence = ["check", "dev-unsafe"]

## Run server
[tool.poe.tasks.dev-unsafe]
help = "Run server without static analysis"
cmd = "python -m lms_backend.run"

# Run static analysis

## Run all tools

[tool.poe.tasks.check]
help = "Format, lint, typecheck"
sequence = ["format", "lint", "typecheck"]

## Typecheck

[tool.poe.tasks.typecheck]
help = "Run all typecheckers"
sequence = ["ty-check", "pyright-check"]

[tool.poe.tasks.ty-check]
help = "Run the 'ty' typechecker"
cmd = "ty check"

[tool.poe.tasks.pyright-check]
help = "Run the 'pyright' typechecker"
cmd = "pyright"

## Lint

[tool.poe.tasks.lint]
help = "Run the 'ruff' linter"
cmd = "ruff check"

## Format

[tool.poe.tasks.format]
help = "Run the 'ruff' formatter"
cmd = "ruff format"

# Run dynamic analysis

## Run tests

[tool.poe.tasks.test]
help = "Run all tests"
sequence = ["test-unit", "test-e2e"]

[tool.poe.tasks.test-unit]
help = "Run unit tests"
cmd = "pytest backend/tests/unit"
envfile = "backend/.env.tests.unit.secret"

[tool.poe.tasks.test-e2e]
help = "Run end-to-end tests against the deployed API"
cmd = "pytest backend/tests/e2e"
envfile = "backend/.env.tests.e2e.secret"

# Export OpenAPI schema

[tool.poe.tasks.export-openapi]
help = "Export OpenAPI schema to openapi.json"
cmd = "python scripts/export-openapi.py"
env = { PYTHONPATH = "backend/src" }

[tool.poe.tasks.check-openapi]
help = "Check that openapi.json is up to date"
cmd = "python scripts/export-openapi.py --check"
env = { PYTHONPATH = "backend/src" }

# Query Qwen Code API

[tool.poe.tasks.query-qwen-code-api]
help = "Query the Qwen Code API: poe query-qwen-code-api [OPTIONS] <prompt>"
cmd = "python scripts/query-qwen-code-api.py"

[tool.pyright]
include = [
  "backend",
  "scripts",
  "mcp",
  "qwen-code-api",

  # Uncomment this later in the lab after you add the matching repos/packages.

  # "nanobot-websocket-channel"
]
extraPaths = [
  "backend/src",
  "mcp/mcp-lms/src",
  "mcp/mcp-obs/src",
  "qwen-code-api/src",

  # Uncomment these later in the lab after you add the matching repos/packages.

  # "nanobot-websocket-channel/mcp-webchat/src",
  # "nanobot-websocket-channel/nanobot-channel-protocol/src",
  # "nanobot-websocket-channel/client-telegram-bot/src",
  # "nanobot-websocket-channel/nanobot-webchat/src",
]
exclude = ["**/__pycache__", "**/node_modules", "**/.*", ".venv", ".direnv"]
typeCheckingMode = "strict"
reportAssignmentType = "none"
reportIncompatibleVariableOverride = "none"
reportUnknownMemberType = "none"
reportMissingTypeStubs = "none"

[tool.pytest.ini_options]
testpaths = ["backend/tests"]
pythonpath = ["backend/src"]
asyncio_mode = "auto"

[tool.ty.src]
include = [
  "backend",
  "mcp",
  "qwen-code-api",

  # Uncomment this later in the lab after you add the matching repos/packages.

  # "nanobot-websocket-channel"
]

[tool.ty.rules]
