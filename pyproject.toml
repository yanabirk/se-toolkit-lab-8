[tool.uv.workspace]
members = ["backend", "client-telegram-bot", "mcp", "nanobot"]

[tool.uv.sources]
nanobot-ai = { path = "nanobot/packages/nanobot-ai" }
lms-mcp = { workspace = true }

# litellm is quarantined on PyPI (2026-03-24); override with direct wheel URL
[tool.uv]
override-dependencies = [
    "litellm @ https://files.pythonhosted.org/packages/02/6c/5327667e6dbe9e98cbfbd4261c8e91386a52e38f41419575854248bbab6a/litellm-1.82.6-py3-none-any.whl",
]

[dependency-groups]
dev = [
  "poethepoet>=0.40.0",
  "pyright==1.1.408",
  "pytest==9.0.2",
  "pytest-asyncio>=0.25.0",
  "ruff==0.14.14",
  "ty==0.0.13",
]

[tool.ruff.lint]
select = ["RET503"]

[tool.poe.tasks]
# Run server

## Check code and run server in dev mode

[tool.poe.tasks.dev]
help = "Run server after static analysis"
sequence = ["check", "dev-unsafe"]

## Run server
[tool.poe.tasks.dev-unsafe]
help = "Run server without static analysis"
cmd = "python backend/app/run.py"

# Run static analysis

## Run all tools

[tool.poe.tasks.check]
help = "Format, lint, typecheck"
sequence = ["format", "lint", "typecheck"]

## Typecheck

[tool.poe.tasks.typecheck]
help = "Run all typecheckers"
sequence = ["ty-check", "pyright-check"]

[tool.poe.tasks.ty-check]
help = "Run the 'ty' typechecker"
cmd = "ty check"

[tool.poe.tasks.pyright-check]
help = "Run the 'pyright' typechecker"
cmd = "pyright"

## Lint

[tool.poe.tasks.lint]
help = "Run the 'ruff' linter"
cmd = "ruff check"

## Format

[tool.poe.tasks.format]
help = "Run the 'ruff' formatter"
cmd = "ruff format"

# Run dynamic analysis

## Run tests

[tool.poe.tasks.test]
help = "Run all tests"
sequence = ["test-unit", "test-e2e"]

[tool.poe.tasks.test-unit]
help = "Run unit tests"
cmd = "pytest backend/tests/unit"
envfile = "backend/.env.tests.unit.secret"

[tool.poe.tasks.test-e2e]
help = "Run end-to-end tests against the deployed API"
cmd = "pytest backend/tests/e2e"
envfile = "backend/.env.tests.e2e.secret"

# Export OpenAPI schema

[tool.poe.tasks.export-openapi]
help = "Export OpenAPI schema to openapi.json"
cmd = "python scripts/export-openapi.py"
env = { PYTHONPATH = "backend" }

[tool.poe.tasks.check-openapi]
help = "Check that openapi.json is up to date"
cmd = "python scripts/export-openapi.py --check"
env = { PYTHONPATH = "backend" }

# Flutter

[tool.poe.tasks.flutter]
help = "Run flutter CLI in client-web-flutter via Docker: poe flutter <args>"
cmd = "docker run --rm -v ./client-web-flutter:/app -w /app harbor.pg.innopolis.university/ghcr-proxy/cirruslabs/flutter:3.41.2 flutter"

# Query Qwen Code API

[tool.poe.tasks.query-qwen-code-api]
help = "Query the Qwen Code API: poe query-qwen-code-api [OPTIONS] <prompt>"
cmd = "python scripts/query-qwen-code-api.py"

# Bot

[tool.poe.tasks.bot]
help = "Run bot in Telegram mode"
cmd = "python client-telegram-bot/bot.py"
envfile = "client-telegram-bot/.env.secret"

[tool.poe.tasks.bot-test]
help = "Run bot in Test mode"
cmd = "python client-telegram-bot/bot.py --test"
envfile = "client-telegram-bot/.env.secret"

[tool.pyright]
include = ["backend", "client-telegram-bot", "scripts", "nanobot", "mcp"]
extraPaths = ["backend"]
exclude = ["**/__pycache__", "**/node_modules", "**/.*", ".venv", ".direnv"]
typeCheckingMode = "strict"
reportAssignmentType = "none"
reportIncompatibleVariableOverride = "none"

[tool.pytest.ini_options]
testpaths = ["backend/tests"]
pythonpath = ["backend"]
asyncio_mode = "auto"

[tool.ty.src]
include = ["backend", "client-telegram-bot", "nanobot", "mcp"]
